include dracula.conf

font_family CaskaydiaCove NF
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0

url_color #0087bd
url_style curly

detect_urls yes

enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color none
window_alert_on_bell no
command_on_bell none
bell_path none

window_padding_width 5

background_opacity 0.7

# Tab bar
active_tab_foreground   #f8f8f2
active_tab_background   #282a36
active_tab_font_style   bold-italic
inactive_tab_foreground #44475a
inactive_tab_background #282a36
inactive_tab_font_style normal
tab_bar_edge top
tab_bar_background none
tab_bar_style powerline
tab_powerline_style slanted

# Color scheme
# foreground #f8f8f2
# background #282a36

# color0 #282a36
# color8 #44475a

# color1 #ff5555
# color9 #ff5555

# color2  #50fa7b
# color10 #50fa7b

# color3  #f1fa8c
# color11 #f1fa8c

# color4  #8be9fd
# color12 #8be9fd

# color5  #bd93f9
# color13 #bd93f9

# color6  #8be9fd
# color14 #8be9fd

# color7  #f8f8f2
# color15 #f8f8f2

