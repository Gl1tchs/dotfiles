[colors]
background = #282a36
background-alt = #282a36
foreground = #f8f8f2
primary = #8be9fd
secondary = #f1fa8c
alert = #ff5555
disabled = #6272a4

[bar/mybar]
width = 100%
height = 20pt
radius = 1

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Caskaydia Cove NF:size=11:antialias=true;3"

modules-left = workspaces window
modules-right = cpu memory alsa backlight battery network date powermenu 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = bspwm

[module/workspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/window]
type = internal/xwindow
label = %title:0:60:...%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/alsa]
type = internal/alsa

format-volume = %{F#8be9fd}VOLUME%{F-} <label-volume>
format-volume-background = ${colors.background}
format-volume-foreground = ${colors.foreground}
format-volume-padding = 1

label-volume = %percentage%%

# format-muted-prefix =
label-muted = "Muted"
format-muted-background = ${colors.background}
format-muted-foreground = ${colors.alert}
format-muted-padding = 2

[module/date]
type = internal/date
interval = 1.0

time = %I:%M %p
time-alt = %m/%d/%Y%

format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 1
label = %time%

[module/backlight]
type = internal/backlight

card = intel_backlight

format-prefix = "BRIGHTNESS "
format-prefix-foreground = ${colors.primary}
format-padding = 1

label = %percentage%%

[module/battery]
type = internal/battery

full-at = 99

battery = BAT0
adapter = AC

poll-interval = 2
time-format = %I:%M

format-charging = %{F#8be9fd}CHARGING%{F-} <label-charging>
format-charging-foreground = ${colors.foreground}
format-charging-padding = 1

format-discharging = %{F#8be9fd}DISCHARGING%{F-} <label-discharging>
format-discharging-foreground = ${colors.foreground}
format-discharging-padding = 1

label-charging = %percentage%%
label-discharging =  %percentage%%

label-full = FULL
label-full-foreground = ${colors.primary}
label-full-padding = 1

[module/powermenu]
type = custom/menu

expand-right = true

menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = shutdown
menu-0-1-exec = menu-open-2

menu-1-0 = back
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = systemctl reboot

menu-2-0 = shutdown
menu-2-0-exec = systemctl poweroff
menu-2-1 = back
menu-2-1-exec = menu-open-0

format-spacing = 1 
format-background = ${colors.background}
format-foreground = ${colors.alert}
format-padding = 1

label-open = ÔÄĎ
label-close = ÔĀó
label-separator = |

[module/network]
type = internal/network
interface = wlp0s20f3

interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-background = ${colors.background}
format-connected-foreground = ${colors.foreground}
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.background}
format-disconnected-foreground = ${colors.alert}
format-disconnected-padding = 1

label-connected = "%{A1:nm-connection-editor &:} %essid%%{A}"
label-disconnected = %{A1:nm-connection-editor &:} NO CONNECTION%{A}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
